[tools]
aube = "1.25.2"
node = "26.5.0"
oxfmt = "0.59.0"
zola = "0.22.1"

[tasks.format]
description = "Format files"
run = "oxfmt ."

[tasks.clean]
description = "Remove build output directory"
run = "rm -rf public"

[tasks.serve]
description = "Start development server with drafts"
depends = ["clean"]
run = "zola serve --drafts || true"

[tasks.build]
description = "Build site for production"
depends = ["clean"]
run = ["zola build", "node scripts/build.js"]
